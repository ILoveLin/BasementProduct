<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 1800" font-family="Microsoft YaHei, SimHei, sans-serif">
  <defs>
    <marker id="arrowBlue" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2563eb"/>
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#16a34a"/>
    </marker>
    <marker id="arrowRed" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#dc2626"/>
    </marker>
    <marker id="arrowPurple" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#9333ea"/>
    </marker>
    <marker id="arrowOrange" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#ea580c"/>
    </marker>
    <filter id="s">
      <feDropShadow dx="1" dy="2" stdDeviation="3" flood-opacity="0.08"/>
    </filter>
    <filter id="sd">
      <feDropShadow dx="2" dy="3" stdDeviation="4" flood-opacity="0.12"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect x="0" y="0" width="1400" height="1800" fill="#ffffff" rx="0"/>

  <!-- Title Bar -->
  <rect x="0" y="0" width="1400" height="60" fill="#1e3a5f" rx="0"/>
  <text x="700" y="38" text-anchor="middle" fill="white" font-size="22" font-weight="bold">基层智治综合协同平台 · N场景需求匹配与开发全流程</text>

  <!-- ═══════════════════════════════════════════════════════ -->
  <!-- Phase 1: 需求提出 -->
  <!-- ═══════════════════════════════════════════════════════ -->
  <rect x="30" y="78" width="1340" height="26" fill="#eff6ff" rx="4"/>
  <text x="700" y="96" text-anchor="middle" fill="#2563eb" font-size="13" font-weight="bold">阶段一：需求提出（业务需求的来源与申请）</text>

  <!-- Requirement Sources Container -->
  <rect x="50" y="115" width="260" height="100" rx="10" fill="#fff7ed" stroke="#ea580c" stroke-width="2" filter="url(#s)"/>
  <text x="180" y="135" text-anchor="middle" fill="#d35400" font-size="13" font-weight="bold">新需求来源方向</text>
  <line x1="70" y1="142" x2="290" y2="142" stroke="#f0d080" stroke-width="1"/>
  <text x="75" y="158" fill="#555" font-size="10.5">① 政策文件学习 → 对标新要求</text>
  <text x="75" y="173" fill="#555" font-size="10.5">② 业务条线对接 → 梳理新场景</text>
  <text x="75" y="188" fill="#555" font-size="10.5">③ 基层反馈上报 → 响应新诉求</text>
  <text x="75" y="203" fill="#555" font-size="10.5">④ 上级交办任务 → 落实新部署</text>

  <!-- Arrow from sources to main box -->
  <line x1="310" y1="147" x2="470" y2="147" stroke="#ea580c" stroke-width="2.5" marker-end="url(#arrowOrange)"/>

  <!-- Main demand box -->
  <rect x="480" y="118" width="440" height="58" rx="25" fill="#dc2626" filter="url(#sd)"/>
  <text x="700" y="153" text-anchor="middle" fill="white" font-size="18" font-weight="bold">业务需求提出 / 新功能申请</text>

  <line x1="700" y1="176" x2="700" y2="206" stroke="#2563eb" stroke-width="2" marker-end="url(#arrowBlue)"/>

  <!-- ═══════════════════════════════════════════════════════ -->
  <!-- Phase 2: 五大要素判定 -->
  <!-- ═══════════════════════════════════════════════════════ -->
  <rect x="30" y="224" width="1340" height="26" fill="#eff6ff" rx="4"/>
  <text x="700" y="242" text-anchor="middle" fill="#2563eb" font-size="13" font-weight="bold">阶段二：五大要素匹配判定</text>

  <rect x="220" y="262" width="960" height="98" rx="10" fill="#2563eb" filter="url(#sd)"/>
  <text x="700" y="290" text-anchor="middle" fill="white" font-size="15" font-weight="bold">五大要素逐项匹配</text>
  <text x="700" y="312" text-anchor="middle" fill="#c0d4f0" font-size="12">①用户要素（谁在用？角色+权限） → ②地址要素（在哪用？标准地址来源） → ③业务意图（干什么？操作类型）</text>
  <text x="700" y="330" text-anchor="middle" fill="#c0d4f0" font-size="12">④前置状态（能用吗？数据/流程前提） → ⑤设备要素（用什么设备？手机/PC/AI眼镜）</text>
  <text x="700" y="348" text-anchor="middle" fill="#ffd700" font-size="11">对照「N场景模块匹配规则手册」（方案书 6.2.1）逐项判定</text>

  <line x1="700" y1="350" x2="700" y2="390" stroke="#2563eb" stroke-width="2" marker-end="url(#arrowBlue)"/>

  <!-- ═══════════════════════════════════════════════════════ -->
  <!-- Phase 3: 核心决策 -->
  <!-- ═══════════════════════════════════════════════════════ -->
  <rect x="30" y="398" width="1340" height="26" fill="#eff6ff" rx="4"/>
  <text x="700" y="416" text-anchor="middle" fill="#2563eb" font-size="13" font-weight="bold">阶段三：模块匹配 · 核心决策</text>

  <!-- Decision 1: Match? -->
  <polygon points="700,442 890,512 700,582 510,512" fill="white" stroke="#2563eb" stroke-width="3" filter="url(#sd)"/>
  <text x="700" y="502" text-anchor="middle" fill="#2563eb" font-size="16" font-weight="bold">匹配现有N场景模块？</text>
  <text x="700" y="524" text-anchor="middle" fill="#888" font-size="11">对照 6.2.2 ~ 6.2.11 十大业务模块</text>

  <!-- YES -->
  <line x1="890" y1="512" x2="1060" y2="512" stroke="#16a34a" stroke-width="3" marker-end="url(#arrowGreen)"/>
  <text x="975" y="500" text-anchor="middle" fill="#16a34a" font-size="14" font-weight="bold">✓ 是</text>

  <rect x="920" y="470" width="140" height="84" rx="8" fill="#16a34a" filter="url(#s)"/>
  <text x="990" y="505" text-anchor="middle" fill="white" font-size="14" font-weight="bold">直接复用</text>
  <text x="990" y="525" text-anchor="middle" fill="#d5f5e3" font-size="10">调用已有模块</text>
  <text x="990" y="542" text-anchor="middle" fill="#d5f5e3" font-size="10">API / 组件 / 流程</text>

  <!-- Existing Module List -->
  <rect x="1080" y="442" width="290" height="140" rx="8" fill="#f0fdf4" stroke="#16a34a" stroke-width="1.5" filter="url(#s)"/>
  <text x="1225" y="465" text-anchor="middle" fill="#1e8449" font-size="12" font-weight="bold">现有N场景业务模块</text>
  <line x1="1095" y1="472" x2="1355" y2="472" stroke="#d5f5e3" stroke-width="1"/>
  <text x="1100" y="492" fill="#333" font-size="10.5">6.2.2 基层信息采集 · 6.2.3 巡查轨迹管理</text>
  <text x="1100" y="510" fill="#333" font-size="10.5">6.2.4 事件闭环处置 · 6.2.5 业务审核</text>
  <text x="1100" y="528" fill="#333" font-size="10.5">6.2.6 安全巡检与宣防 · 6.2.7 便民申请</text>
  <text x="1100" y="546" fill="#333" font-size="10.5">6.2.8 任务执行反馈 · 6.2.9 数据展示</text>
  <text x="1100" y="564" fill="#333" font-size="10.5">6.2.10 账户与绑定 · 6.2.11 通用辅助</text>

  <!-- NO -->
  <line x1="700" y1="582" x2="700" y2="640" stroke="#dc2626" stroke-width="3" marker-end="url(#arrowRed)"/>
  <text x="720" y="615" fill="#dc2626" font-size="14" font-weight="bold">✗ 否，不匹配</text>

  <!-- Decision 2: Commonality? -->
  <polygon points="700,655 860,715 700,775 540,715" fill="white" stroke="#dc2626" stroke-width="2.5" filter="url(#s)"/>
  <text x="700" y="707" text-anchor="middle" fill="#dc2626" font-size="14" font-weight="bold">是否存在共性功能？</text>
  <text x="700" y="726" text-anchor="middle" fill="#888" font-size="10">（与现有模块 / 与其他待开发需求）</text>

  <!-- YES 共性 -->
  <line x1="860" y1="715" x2="1020" y2="715" stroke="#9333ea" stroke-width="2.5" marker-end="url(#arrowPurple)"/>
  <text x="940" y="705" fill="#9333ea" font-size="13" font-weight="bold">有共性</text>

  <rect x="1030" y="670" width="340" height="90" rx="8" fill="#faf5ff" stroke="#9333ea" stroke-width="2" filter="url(#s)"/>
  <text x="1200" y="695" text-anchor="middle" fill="#7c3aed" font-size="14" font-weight="bold">抽象为通用模块</text>
  <text x="1200" y="716" text-anchor="middle" fill="#555" font-size="11">纳入N场景体系（如新增 6.2.12）</text>
  <text x="1200" y="734" text-anchor="middle" fill="#555" font-size="11">沉淀共性能力，供后续需求复用</text>
  <text x="1200" y="752" text-anchor="middle" fill="#9333ea" font-size="10">降低重复开发成本，提升模块复用率</text>

  <!-- NO 无共性 -->
  <line x1="700" y1="775" x2="700" y2="820" stroke="#ea580c" stroke-width="2.5" marker-end="url(#arrowRed)"/>
  <text x="722" y="800" fill="#ea580c" font-size="13" font-weight="bold">无共性</text>

  <rect x="540" y="828" width="320" height="62" rx="8" fill="#fff7ed" stroke="#ea580c" stroke-width="2" filter="url(#s)"/>
  <text x="700" y="853" text-anchor="middle" fill="#d35400" font-size="14" font-weight="bold">个性化独立开发</text>
  <text x="700" y="874" text-anchor="middle" fill="#777" font-size="11">不纳入N场景模块体系 · 作为独立功能交付</text>

  <!-- ═══════════════════════════════════════════════════════ -->
  <!-- Convergence -->
  <!-- ═══════════════════════════════════════════════════════ -->
  <line x1="990" y1="554" x2="990" y2="930" stroke="#888" stroke-width="1.5" stroke-dasharray="6,4"/>
  <line x1="990" y1="930" x2="700" y2="930" stroke="#888" stroke-width="1.5" stroke-dasharray="6,4"/>
  <line x1="1200" y1="760" x2="1200" y2="930" stroke="#888" stroke-width="1.5" stroke-dasharray="6,4"/>
  <line x1="1200" y1="930" x2="700" y2="930" stroke="#888" stroke-width="1.5" stroke-dasharray="6,4"/>
  <line x1="700" y1="890" x2="700" y2="930" stroke="#888" stroke-width="1.5"/>

  <polygon points="700,920 715,937 700,954 685,937" fill="#888"/>

  <!-- ═══════════════════════════════════════════════════════ -->
  <!-- Phase 4: 功能开发 -->
  <!-- ═══════════════════════════════════════════════════════ -->
  <rect x="30" y="968" width="1340" height="26" fill="#eff6ff" rx="4"/>
  <text x="700" y="986" text-anchor="middle" fill="#2563eb" font-size="13" font-weight="bold">阶段四：功能开发实现</text>

  <rect x="200" y="1006" width="1000" height="82" rx="10" fill="#7c3aed" filter="url(#sd)"/>
  <text x="700" y="1034" text-anchor="middle" fill="white" font-size="15" font-weight="bold">功能开发实现 · 联调 · 测试</text>

  <!-- Three paths inside -->
  <rect x="225" y="1048" width="300" height="30" rx="5" fill="rgba(255,255,255,0.15)"/>
  <text x="375" y="1068" text-anchor="middle" fill="#e8daef" font-size="10.5">复用路径：配置化 → 低代码/零代码完成</text>

  <rect x="550" y="1048" width="300" height="30" rx="5" fill="rgba(255,255,255,0.15)"/>
  <text x="700" y="1068" text-anchor="middle" fill="#e8daef" font-size="10.5">新建通用模块：前后端全套开发+测试</text>

  <rect x="875" y="1048" width="300" height="30" rx="5" fill="rgba(255,255,255,0.15)"/>
  <text x="1025" y="1068" text-anchor="middle" fill="#e8daef" font-size="10.5">个性化开发：常规开发流程+评审+测试</text>

  <line x1="700" y1="1088" x2="700" y2="1124" stroke="#2563eb" stroke-width="2" marker-end="url(#arrowBlue)"/>

  <!-- ═══════════════════════════════════════════════════════ -->
  <!-- Phase 5: AI眼镜评估 -->
  <!-- ═══════════════════════════════════════════════════════ -->
  <rect x="30" y="1132" width="1340" height="26" fill="#eff6ff" rx="4"/>
  <text x="700" y="1150" text-anchor="middle" fill="#2563eb" font-size="13" font-weight="bold">阶段五：AI眼镜适配评估（每个功能必经）</text>

  <polygon points="700,1172 860,1226 700,1280 540,1226" fill="white" stroke="#2563eb" stroke-width="2.5" filter="url(#s)"/>
  <text x="700" y="1216" text-anchor="middle" fill="#2563eb" font-size="14" font-weight="bold">适合AI眼镜协同？</text>
  <text x="700" y="1236" text-anchor="middle" fill="#888" font-size="10">对照推荐等级体系（P0-P3）评估</text>

  <!-- YES AI -->
  <line x1="860" y1="1226" x2="1010" y2="1226" stroke="#16a34a" stroke-width="2.5" marker-end="url(#arrowGreen)"/>
  <text x="935" y="1215" fill="#16a34a" font-size="12" font-weight="bold">是</text>

  <rect x="1020" y="1195" width="350" height="62" rx="8" fill="#f0fdf4" stroke="#16a34a" stroke-width="1.5" filter="url(#s)"/>
  <text x="1195" y="1218" text-anchor="middle" fill="#1e8449" font-size="12" font-weight="bold">接入AI眼镜交互层</text>
  <text x="1195" y="1236" text-anchor="middle" fill="#555" font-size="10">AR引导 · 语音录入 · 第一视角拍照 · AI识别 · RTC协作</text>
  <text x="1195" y="1252" text-anchor="middle" fill="#888" font-size="9">按 P0→P1→P2 优先级排期开发眼镜端适配</text>

  <!-- NO AI -->
  <line x1="700" y1="1280" x2="700" y2="1318" stroke="#dc2626" stroke-width="2.5" marker-end="url(#arrowRed)"/>
  <text x="720" y="1302" fill="#dc2626" font-size="12" font-weight="bold">否</text>

  <rect x="540" y="1325" width="320" height="42" rx="8" fill="#fef2f2" stroke="#dc2626" stroke-width="1.5" filter="url(#s)"/>
  <text x="700" y="1347" text-anchor="middle" fill="#dc2626" font-size="12" font-weight="bold">纯手机端 / PC端交互</text>
  <text x="700" y="1362" text-anchor="middle" fill="#999" font-size="10">不涉及眼镜端开发，保持现有交互方式</text>

  <!-- Convergence -->
  <line x1="1195" y1="1257" x2="1195" y2="1400" stroke="#888" stroke-width="1.5" stroke-dasharray="6,4"/>
  <line x1="1195" y1="1400" x2="700" y2="1400" stroke="#888" stroke-width="1.5" stroke-dasharray="6,4"/>
  <line x1="700" y1="1367" x2="700" y2="1400" stroke="#888" stroke-width="1.5"/>
  <polygon points="700,1390 715,1407 700,1424 685,1407" fill="#888"/>

  <!-- ═══════════════════════════════════════════════════════ -->
  <!-- Phase 6: 上线交付 -->
  <!-- ═══════════════════════════════════════════════════════ -->
  <rect x="30" y="1438" width="1340" height="26" fill="#eff6ff" rx="4"/>
  <text x="700" y="1456" text-anchor="middle" fill="#2563eb" font-size="13" font-weight="bold">阶段六：上线交付</text>

  <rect x="430" y="1476" width="540" height="54" rx="25" fill="#1e40af" filter="url(#sd)"/>
  <text x="700" y="1509" text-anchor="middle" fill="white" font-size="17" font-weight="bold">测试通过 → 上线发布 → 纳入平台能力目录</text>

  <!-- ====== Bottom Legend ====== -->
  <rect x="30" y="1560" width="1340" height="200" rx="8" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>

  <text x="60" y="1590" fill="#333" font-size="14" font-weight="bold">流程图例</text>

  <!-- Row 1 -->
  <line x1="60" y1="1620" x2="120" y2="1620" stroke="#16a34a" stroke-width="3"/>
  <text x="130" y="1625" fill="#333" font-size="11">匹配/推荐路径（直接复用）</text>

  <line x1="330" y1="1620" x2="390" y2="1620" stroke="#dc2626" stroke-width="3"/>
  <text x="400" y="1625" fill="#333" font-size="11">不匹配/不推荐路径</text>

  <line x1="600" y1="1620" x2="660" y2="1620" stroke="#9333ea" stroke-width="2.5"/>
  <text x="670" y="1625" fill="#333" font-size="11">新建通用模块路径</text>

  <line x1="880" y1="1620" x2="940" y2="1620" stroke="#ea580c" stroke-width="2.5"/>
  <text x="950" y="1625" fill="#333" font-size="11">个性化开发路径</text>

  <!-- Row 2 -->
  <line x1="60" y1="1650" x2="120" y2="1650" stroke="#888" stroke-width="1.5" stroke-dasharray="6,4"/>
  <text x="130" y="1655" fill="#333" font-size="11">流程汇聚线</text>

  <polygon points="330,1644 345,1650 330,1656 315,1650" fill="#888"/>
  <text x="400" y="1655" fill="#333" font-size="11">汇聚点</text>

  <rect x="600" y="1640" width="30" height="18" rx="3" fill="#eff6ff"/>
  <text x="670" y="1655" fill="#333" font-size="11">阶段标识条</text>

  <rect x="880" y="1640" width="80" height="18" rx="3" fill="#2563eb"/>
  <text x="950" y="1655" fill="#333" font-size="11">→ 蓝底白字 = 关键处理节点</text>

  <!-- Summary -->
  <text x="60" y="1695" fill="#555" font-size="11" font-weight="bold">流程要点：</text>
  <text x="60" y="1715" fill="#888" font-size="10.5">1. 每个新需求先经过五大要素判定，再进入模块匹配决策。</text>
  <text x="60" y="1732" fill="#888" font-size="10.5">2. 优先复用现有N场景模块（6.2.2~6.2.11），避免重复造轮子。</text>
  <text x="60" y="1749" fill="#888" font-size="10.5">3. 不匹配但存在共性 → 抽象为通用模块纳入体系，以便后续复用。</text>
</svg>
