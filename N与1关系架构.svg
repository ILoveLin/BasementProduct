<text x="460" y="170" text-anchor="middle" font-size="12" fill="#166534">二维码门牌</text>
<rect x="95" y="208" width="130" height="50" rx="8" fill="#ffffff" stroke="#86efac" stroke-width="1.5" filter="url(#s)"/>
<text x="160" y="240" text-anchor="middle" font-size="12" fill="#166534">融合通讯终端</text>
<rect x="245" y="208" width="130" height="50" rx="8" fill="#ffffff" stroke="#86efac" stroke-width="1.5" filter="url(#s)"/>
<text x="310" y="240" text-anchor="middle" font-size="12" fill="#166534">IoT传感器</text>
<rect x="395" y="208" width="130" height="50" rx="8" fill="#ffffff" stroke="#86efac" stroke-width="1.5" filter="url(#s)"/>
<text x="460" y="240" text-anchor="middle" font-size="12" fill="#166534">AI摄像头</text>
<rect x="95" y="278" width="130" height="50" rx="8" fill="#ffffff" stroke="#86efac" stroke-width="1.5" filter="url(#s)"/>
<text x="160" y="310" text-anchor="middle" font-size="12" fill="#166534">北斗终端</text>
<rect x="245" y="278" width="130" height="50" rx="8" fill="#ffffff" stroke="#86efac" stroke-width="1.5" filter="url(#s)"/>
<text x="310" y="310" text-anchor="middle" font-size="12" fill="#166534">赣政通</text>
<rect x="395" y="278" width="130" height="50" rx="8" fill="#ffffff" stroke="#86efac" stroke-width="1.5" filter="url(#s)"/>
<text x="460" y="310" text-anchor="middle" font-size="12" fill="#166534">E呼即办</text>
<rect x="170" y="348" width="150" height="50" rx="8" fill="#ffffff" stroke="#86efac" stroke-width="1.5" filter="url(#s)"/>
<text x="245" y="380" text-anchor="middle" font-size="12" fill="#166534">智慧调度</text>
<rect x="340" y="348" width="150" height="50" rx="8" fill="#ffffff" stroke="#86efac" stroke-width="1.5" filter="url(#s)"/>
<text x="415" y="380" text-anchor="middle" font-size="12" fill="#166534">效能评估</text>
<text x="300" y="470" text-anchor="middle" font-size="10" fill="#166534">11个可插拔模块 | 即插即用 | 可独立交付 | 品牌无关化</text>
<rect x="660" y="80" width="480" height="400" rx="12" fill="#eff6ff" stroke="#3b82f6" stroke-width="2.5" filter="url(#sd)"/>
<rect x="660" y="80" width="480" height="40" rx="12" fill="#3b82f6"/>
<rect x="660" y="108" width="480" height="12" fill="#3b82f6"/>
<text x="900" y="106" text-anchor="middle" font-size="17" font-weight="bold" fill="#ffffff">第一个1：基础平台（Platform）—— "底座层"</text>
<rect x="710" y="140" width="380" height="45" rx="8" fill="#ffffff" stroke="#93c5fd" stroke-width="1.5" filter="url(#s)"/>
<text x="900" y="169" text-anchor="middle" font-size="13" fill="#1e40af">数据中台（一标三实 · 多源汇聚 · 数据治理）</text>
<rect x="710" y="200" width="380" height="45" rx="8" fill="#ffffff" stroke="#93c5fd" stroke-width="1.5" filter="url(#s)"/>
<text x="900" y="229" text-anchor="middle" font-size="13" fill="#1e40af">GIS时空底座（天地图 · 一张图作战 · 空间分析 · 电子围栏）</text>
<rect x="710" y="260" width="380" height="45" rx="8" fill="#ffffff" stroke="#93c5fd" stroke-width="1.5" filter="url(#s)"/>
<text x="900" y="289" text-anchor="middle" font-size="13" fill="#1e40af">事件总线引擎（发现→上报→分拨→处置→反馈→评价）</text>
<rect x="710" y="320" width="380" height="45" rx="8" fill="#ffffff" stroke="#93c5fd" stroke-width="1.5" filter="url(#s)"/>
<text x="900" y="349" text-anchor="middle" font-size="13" fill="#1e40af">周边（地址关联智能推送 · 扫码得全息画像）</text>
<rect x="710" y="380" width="380" height="45" rx="8" fill="#ffffff" stroke="#93c5fd" stroke-width="1.5" filter="url(#s)"/>
<text x="900" y="409" text-anchor="middle" font-size="13" fill="#1e40af">格友圈 / 协同圈（跨部门协同 · 居民互动）</text>
<text x="900" y="470" text-anchor="middle" font-size="10" fill="#1e40af">三大核心引擎 + 两大协同能力 | 统一底座 | 自主研发 | 一次采集多方复用</text>
<line x1="540" y1="180" x2="660" y2="180" stroke="#22c55e" stroke-width="2.5" marker-end="url(#ag)"/>
<rect x="545" y="170" width="60" height="18" rx="2" fill="#fff" opacity="0.95"/>
<text x="575" y="183" text-anchor="middle" font-size="10" fill="#22c55e">能力注入</text>
<line x1="660" y1="240" x2="540" y2="240" stroke="#3b82f6" stroke-width="2.5" marker-end="url(#ab)"/>
<rect x="545" y="230" width="60" height="18" rx="2" fill="#fff" opacity="0.95"/>
<text x="575" y="243" text-anchor="middle" font-size="10" fill="#3b82f6">底座支撑</text>
<line x1="540" y1="350" x2="660" y2="350" stroke="#059669" stroke-width="1.5" marker-end="url(#ag)" stroke-dasharray="4,4"/>
<rect x="535" y="340" width="80" height="18" rx="2" fill="#fff" opacity="0.95"/>
<text x="575" y="353" text-anchor="middle" font-size="10" fill="#059669">数据汇入底座</text>
<rect x="60" y="498" width="1080" height="50" rx="6" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
<text x="600" y="516" text-anchor="middle" font-size="11" fill="#475569">融合使用：N的能力通过1的数据中台 / GIS / 事件总线 / 周边 / 格友圈等共性服务，向治理场景层输出完整解决方案。事件总线是连接数据、感知、AI、场景的"中枢神经"</text>
<text x="600" y="534" text-anchor="middle" font-size="11" fill="#475569">独立使用：N的模块可脱离1单独运行（如无人机系统可独立部署），通过标准接口与客户现有平台对接</text>
</svg>