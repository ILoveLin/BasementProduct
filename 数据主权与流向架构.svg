<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 540" font-family="Microsoft YaHei, SimHei, sans-serif">
<defs><filter id="s"><feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.08"/></filter><filter id="sd"><feDropShadow dx="0" dy="3" stdDeviation="4" flood-opacity="0.12"/></filter><marker id="au" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0,10 3.5,0 7" fill="#2563eb"/></marker></defs>
<rect width="1200" height="540" fill="#ffffff"/>
<rect x="0" y="0" width="1200" height="48" fill="#1e3a5f"/>
<text x="600" y="30" text-anchor="middle" font-size="19" font-weight="bold" fill="#ffffff">数据主权与流向架构 —— 平台是唯一数据源，部门按需同步</text>
<rect x="80" y="70" width="1040" height="100" rx="10" fill="#fef2f2" stroke="#ef4444" stroke-width="2" filter="url(#sd)"/>
<rect x="80" y="70" width="1040" height="34" rx="10" fill="#ef4444"/>
<rect x="80" y="94" width="1040" height="10" fill="#ef4444"/>
<text x="600" y="93" text-anchor="middle" font-size="15" font-weight="bold" fill="#ffffff">使用层 —— 各部门按需从平台同步数据至各自业务系统</text>
<rect x="130" y="116" width="145" height="40" rx="6" fill="#ffffff" stroke="#fca5a5" stroke-width="1.5" filter="url(#s)"/>
<text x="202" y="140" text-anchor="middle" font-size="12" fill="#991b1b">公安人口库</text>
<rect x="295" y="116" width="145" height="40" rx="6" fill="#ffffff" stroke="#fca5a5" stroke-width="1.5" filter="url(#s)"/>
<text x="367" y="140" text-anchor="middle" font-size="12" fill="#991b1b">消防监管系统</text>
<rect x="460" y="116" width="145" height="40" rx="6" fill="#ffffff" stroke="#fca5a5" stroke-width="1.5" filter="url(#s)"/>
<text x="532" y="140" text-anchor="middle" font-size="12" fill="#991b1b">城管执法系统</text>
<rect x="625" y="116" width="145" height="40" rx="6" fill="#ffffff" stroke="#fca5a5" stroke-width="1.5" filter="url(#s)"/>
<text x="697" y="140" text-anchor="middle" font-size="12" fill="#991b1b">民政养老系统</text>
<rect x="790" y="116" width="145" height="40" rx="6" fill="#ffffff" stroke="#fca5a5" stroke-width="1.5" filter="url(#s)"/>
<text x="862" y="140" text-anchor="middle" font-size="12" fill="#991b1b">自然资源系统</text>
<rect x="955" y="116" width="145" height="40" rx="6" fill="#ffffff" stroke="#fca5a5" stroke-width="1.5" filter="url(#s)"/>
<text x="1027" y="140" text-anchor="middle" font-size="12" fill="#991b1b">生态环境系统</text>
<line x1="600" y1="230" x2="600" y2="180" stroke="#2563eb" stroke-width="2.5" marker-end="url(#au)"/>
<rect x="540" y="195" width="120" height="18" rx="2" fill="#fff" opacity="0.95"/>
<text x="600" y="208" text-anchor="middle" font-size="11" fill="#2563eb">按需同步 ↑</text>
<rect x="80" y="230" width="1040" height="110" rx="10" fill="#eff6ff" stroke="#3b82f6" stroke-width="3" filter="url(#sd)"/>
<rect x="80" y="230" width="1040" height="38" rx="10" fill="#2563eb"/>
<rect x="80" y="256" width="1040" height="12" fill="#2563eb"/>
<text x="600" y="256" text-anchor="middle" font-size="16" font-weight="bold" fill="#ffffff">存储层 —— 基层平台数据中台 · "一标三实"唯一数据源</text>
<text x="600" y="288" text-anchor="middle" font-size="13" fill="#1e40af">所有采集数据统一存储 | 不做分散存储 | 数据鲜活度统一维护 | 安全隐私统一管控</text>
<text x="600" y="312" text-anchor="middle" font-size="11" fill="#64748b">平台是数据的"总仓库"，部门是数据的"使用者"</text>
<line x1="600" y1="400" x2="600" y2="350" stroke="#2563eb" stroke-width="2.5" marker-end="url(#au)"/>
<rect x="540" y="365" width="120" height="18" rx="2" fill="#fff" opacity="0.95"/>
<text x="600" y="378" text-anchor="middle" font-size="11" fill="#2563eb">全部数据汇入 ↑</text>
<rect x="80" y="400" width="1040" height="90" rx="10" fill="#f0fdf4" stroke="#22c55e" stroke-width="2" filter="url(#sd)"/>
<rect x="80" y="400" width="1040" height="34" rx="10" fill="#22c55e"/>
<rect x="80" y="424" width="1040" height="10" fill="#22c55e"/>
<text x="600" y="423" text-anchor="middle" font-size="15" font-weight="bold" fill="#ffffff">采集层 —— N模块产生的全部数据</text>
<rect x="130" y="446" width="140" height="30" rx="12" fill="#ffffff" stroke="#86efac" stroke-width="1.5"/>
<text x="200" y="466" text-anchor="middle" font-size="11" fill="#166534">AI眼镜</text>
<rect x="290" y="446" width="140" height="30" rx="12" fill="#ffffff" stroke="#86efac" stroke-width="1.5"/>
<text x="360" y="466" text-anchor="middle" font-size="11" fill="#166534">无人机</text>
<rect x="450" y="446" width="140" height="30" rx="12" fill="#ffffff" stroke="#86efac" stroke-width="1.5"/>
<text x="520" y="466" text-anchor="middle" font-size="11" fill="#166534">二维码门牌</text>
<rect x="610" y="446" width="140" height="30" rx="12" fill="#ffffff" stroke="#86efac" stroke-width="1.5"/>
<text x="680" y="466" text-anchor="middle" font-size="11" fill="#166534">IoT传感器</text>
<rect x="770" y="446" width="140" height="30" rx="12" fill="#ffffff" stroke="#86efac" stroke-width="1.5"/>
<text x="840" y="466" text-anchor="middle" font-size="11" fill="#166534">AI摄像头</text>
<rect x="930" y="446" width="140" height="30" rx="12" fill="#ffffff" stroke="#86efac" stroke-width="1.5"/>
<text x="1000" y="466" text-anchor="middle" font-size="11" fill="#166534">北斗终端</text>
<text x="50" y="280" text-anchor="middle" font-size="11" fill="#3b82f6" font-weight="bold" transform="rotate(-90, 50, 280)">数据流向 ↑ 自下而上汇聚</text>
<text x="1150" y="120" text-anchor="middle" font-size="10" fill="#ef4444" font-weight="bold">部门系统</text>
<text x="1150" y="285" text-anchor="middle" font-size="10" fill="#3b82f6" font-weight="bold">平台中枢</text>
<text x="1150" y="445" text-anchor="middle" font-size="10" fill="#22c55e" font-weight="bold">数据采集</text>
</svg>