<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 560" font-family="Microsoft YaHei, SimHei, sans-serif">
<defs>
<filter id="s"><feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.08"/></filter>
<filter id="sd"><feDropShadow dx="0" dy="3" stdDeviation="4" flood-opacity="0.12"/></filter>
<marker id="ag" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0,10 3.5,0 7" fill="#22c55e"/></marker>
<marker id="ab" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0,10 3.5,0 7" fill="#3b82f6"/></marker>
</defs>
<rect width="1200" height="560" fill="#ffffff"/>
<rect x="0" y="0" width="1200" height="48" fill="#1e3a5f"/>
<text x="600" y="30" text-anchor="middle" font-size="19" font-weight="bold" fill="#ffffff">第一个N（生态平台）←→ 第一个1（基础平台）关系模型（V2：新增事件总线引擎）</text>
<rect x="60" y="80" width="480" height="400" rx="12" fill="#f0fdf4" stroke="#22c55e" stroke-width="2.5" filter="url(#sd)"/>
<rect x="60" y="80" width="480" height="40" rx="12" fill="#22c55e"/>
<rect x="60" y="108" width="480" height="12" fill="#22c55e"/>
<text x="300" y="106" text-anchor="middle" font-size="17" font-weight="bold" fill="#ffffff">第一个N：生态平台（Ecology）—— "插件层"</text>
<rect x="95" y="138" width="130" height="50" rx="8" fill="#ffffff" stroke="#86efac" stroke-width="1.5" filter="url(#s)"/>
<text x="160" y="170" text-anchor="middle" font-size="12" fill="#166534">AI眼镜</text>
